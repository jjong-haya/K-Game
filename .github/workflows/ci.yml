name: K-Game CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web:
    name: Frontend Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  api:
    name: Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run check

  lambdas:
    name: Lambda Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [prompt-engine, prompt-hint, daily-word-generate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/lambdas/${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: services/lambdas/${{ matrix.service }}
      - run: npm test
        working-directory: services/lambdas/${{ matrix.service }}

  terraform:
    name: Infrastructure Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform validate

  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check docs and repo hygiene
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          roots = [
              Path("README.md"),
              Path("CONTRIBUTING.md"),
              Path("SECURITY.md"),
              Path("CHANGELOG.md"),
              Path("package.json"),
              Path("docs/project-overview.md"),
              Path("docs/architecture.md"),
              Path("docs/architecture-faq.md"),
              Path("docs/auth-policy.md"),
              Path("docs/api-spec.md"),
              Path("docs/deployment.md"),
              Path("docs/security-checklist.md"),
              Path("docs/troubleshooting.md"),
              Path("docs/demo-script.md"),
              Path("docs/evaluator-guide.md"),
              Path("docs/release-checklist.md"),
              Path("docs/repository-guide.md"),
              Path("infra/README.md"),
              Path("infra/scripts/README.md"),
              Path("infra/terraform/README.md"),
              Path(".github/pull_request_template.md"),
              Path(".github/ISSUE_TEMPLATE/bug_report.md"),
              Path(".github/ISSUE_TEMPLATE/feature_request.md"),
              Path(".github/ISSUE_TEMPLATE/release_checklist.md"),
              Path(".github/ISSUE_TEMPLATE/config.yml"),
              Path(".github/dependabot.yml"),
          ]
          forbidden = [
              r"C:\\Users\\",
              r"/C:/Users/",
              r"client/",
              r"server/",
              r"deploy/",
              r"game-lambda/",
              r"word-judge-lambda/",
              r"word-reply-lambda/",
              r"bedrock-lambda/",
              r"gemini-lambda/",
              r"README_AWS\.md",
          ]

          files = []
          for root in roots:
              if root.is_file():
                  files.append(root)
              elif root.is_dir():
                  files.extend([p for p in root.rglob("*") if p.is_file()])

          bad = []
          for path in files:
              try:
                  text = path.read_text(encoding="utf-8")
              except Exception:
                  continue
              for pattern in forbidden:
                  if re.search(pattern, text):
                      bad.append(f"{path}: {pattern}")

          if bad:
              print("Forbidden references found:")
              for item in bad:
                  print(item)
              sys.exit(1)
          print("Repo hygiene check passed.")
          PY
